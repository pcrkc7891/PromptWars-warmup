<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta implementation for crawler indexing and description -->
    <meta name="description" content="ResQ-Route Emergency Triage System - Converts messy disaster signals into structured JSON actionable logistics.">
    <meta name="theme-color" content="#0f172a">
    <title>ResQ-Route | Disaster Signal Aggregator</title>
    <!-- Explicit Zero-Size Favicon URI preventing 404 routing logic execution leaks -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh" aria-hidden="true"></div>
    <div class="container">
        <!-- Semantic Document Structure -->
        <header role="banner">
            <h1><span class="highlight">ResQ-Route</span> Triage</h1>
            <p>Gemini-powered Unstructured Emergency Signal Structuralizer.</p>
        </header>
        
        <main class="dashboard" role="main">
            <!-- Accessibility structural landmarks using sections -->
            <section class="input-panel glass" aria-labelledby="input-heading">
                <h2 id="input-heading">Raw Incoming Signal</h2>
                
                <!-- Explicit accessibility relationships (Labels specifically) -->
                <label for="raw-signal" class="visually-hidden">Paste or type unstructured raw emergency signal here.</label>
                <textarea 
                    id="raw-signal" 
                    name="raw-signal"
                    placeholder="E.g., Water is rising fast up to the 2nd floor window! Can't leave the house, grandma is trapped. We are at 502 Elm Street. Please send help..."
                    aria-label="Raw Incoming Signal"
                    aria-required="true"
                ></textarea>
                
                <div class="controls">
                    <button id="process-btn" type="button" aria-label="Analyze the unformatted signal through Gemini">Analyze Signal</button>
                    <!-- Loading state for visually impaired users -->
                    <div class="loading-spinner hidden" id="spinner" role="progressbar" aria-label="Processing signal"></div>
                </div>
                <div id="error-msg" class="error hidden" role="alert"></div>
            </section>

            <section class="output-panel glass" aria-labelledby="output-heading">
                <h2 id="output-heading">Structured Action Plan</h2>
                <div class="placeholder" id="output-placeholder">
                    Awaiting signal analysis...
                </div>
                
                <!-- A11y Live region. Changes to this node will be read aloud immediately. -->
                <div class="results hidden" id="results" aria-live="polite">
                    <div class="result-header">
                        <span id="priority-badge" class="badge">Priority 1</span>
                        <h3 id="res-severity">Critical</h3>
                    </div>
                    
                    <div class="data-grid">
                        <div class="data-item">
                            <span class="label">Intent</span>
                            <span class="value" id="res-intent">-</span>
                        </div>
                        <div class="data-item">
                            <span class="label">Location</span>
                            <span class="value" id="res-location">-</span>
                        </div>
                    </div>
                    
                    <div class="action-box">
                        <span class="label">Immediate Life-Saving Action:</span>
                        <p id="res-action">-</p>
                    </div>
                    
                    <div class="json-preview">
                        <span class="label">Verified JSON Payload:</span>
                        <!-- Code blocks must be semantic -->
                        <pre><code id="json-code" aria-label="Raw Output JSON Schema"></code></pre>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
